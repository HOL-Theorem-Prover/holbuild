name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      test-jobs:
        description: 'Number of holbuild test cases to run concurrently'
        required: false
        default: '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read HOL4 pin
        id: hol4-pin
        run: echo "hol4-ref=$(tr -d '[:space:]' < vendor/hol/REV)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-polyml
        id: polyml

      - uses: ./.github/actions/setup-trknl-polyml
        id: trknl-polyml

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y inotify-tools

      - name: Configure holbuild test cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore HOL toolchain cache
        id: hol-toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-with-trknl-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.trknl-polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v2

      - name: Build holbuild
        run: make

      - name: Setup schema2 HOL cache
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          {
            echo '[holbuild]'
            echo 'schema = 2'
            echo 'minimum_version = "0.10.0"'
            echo
            echo '[dependencies.hol]'
            echo 'git = "https://github.com/HOL-Theorem-Prover/HOL.git"'
            echo 'rev = "${{ steps.hol4-pin.outputs.hol4-ref }}"'
            echo
            echo '[project]'
            echo 'name = "ci-toolchain"'
          } > "$tmp/holproject.toml"
          holdir=$(cd "$tmp" && "$GITHUB_WORKSPACE/bin/holbuild" buildhol | tail -n 1)
          trknl_holdir=$(cd "$tmp" && HOLBUILD_POLY="${{ steps.trknl-polyml.outputs.polyml-bin }}" "$GITHUB_WORKSPACE/bin/holbuild" buildhol --trknl | tail -n 1)
          echo "HOLDIR=$holdir" >> "$GITHUB_ENV"
          echo "HOLBUILD_TRKNL_POLY=${{ steps.trknl-polyml.outputs.polyml-bin }}" >> "$GITHUB_ENV"
          echo "Tracing HOLDIR: $trknl_holdir"

      - name: Save HOL toolchain cache
        if: steps.hol-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-with-trknl-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.trknl-polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v2

      - name: Run tests
        env:
          TMPDIR: ${{ runner.temp }}
          HOLBUILD_TEST_JOBS: ${{ inputs.test-jobs || '4' }}
        run: make HOLDIR="$HOLDIR" test
