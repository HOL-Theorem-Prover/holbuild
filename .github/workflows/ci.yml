name: CI

on:
  pull_request:
  merge_group:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      test-jobs:
        description: 'Number of holbuild test cases to run concurrently'
        required: false
        default: '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Read HOL4 pin
        id: hol4-pin
        run: echo "hol4-ref=$(tr -d '[:space:]' < vendor/hol/REV)" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/setup-polyml
        id: polyml

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y inotify-tools

      - name: Configure holbuild test cache
        run: echo "HOLBUILD_CACHE=$HOME/.cache/holbuild" >> "$GITHUB_ENV"

      - name: Restore HOL toolchain cache
        id: hol-toolchain-cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Build holbuild
        run: make

      - name: Setup schema2 HOL cache
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          cat > "$tmp/holproject.toml" <<EOF
          [holbuild]
          schema = 2

          [dependencies.hol]
          git = "https://github.com/HOL-Theorem-Prover/HOL.git"
          rev = "${{ steps.hol4-pin.outputs.hol4-ref }}"

          [project]
          name = "ci-toolchain"
          EOF
          holdir=$(cd "$tmp" && "$GITHUB_WORKSPACE/bin/holbuild" buildhol | tail -n 1)
          echo "HOLDIR=$holdir" >> "$GITHUB_ENV"

      - name: Save HOL toolchain cache
        if: steps.hol-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/holbuild/hol-toolchains
          key: hol-toolchains-${{ runner.os }}-${{ steps.polyml.outputs.polyml-rev }}-${{ steps.hol4-pin.outputs.hol4-ref }}-v3

      - name: Run tests
        env:
          TMPDIR: ${{ runner.temp }}
          HOLBUILD_TEST_JOBS: ${{ inputs.test-jobs || '4' }}
        run: make HOLDIR="$HOLDIR" test
